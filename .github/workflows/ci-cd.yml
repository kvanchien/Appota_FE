# ============================================================
# CI/CD Pipeline — Appota Frontend
# Repository:  github.com/kvanchien/Appota_FE
# Docker Hub:  kvanchien/demo-frontend
# ============================================================

name: CI/CD — Build & Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*' # Trigger on semantic version tags (v1.0.0, v2.1.3, ...)
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Cancel in-progress runs on the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: kvanchien/demo-frontend
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Lint & Format check
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ──────────────────────────────────────────────
  # JOB 2 — Build (verify Vite build succeeds)
  # ──────────────────────────────────────────────
  build-check:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000' }}
        run: npm run build

      - name: Upload dist artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────
  # JOB 3 — Docker: Build & Push to Docker Hub
  # Runs only on push to main/develop or on tags
  # ──────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'push' # Skip for pull_request events

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tags based on git ref
      # Examples:
      #   push to main    → latest, sha-abc1234
      #   push to develop → develop, sha-abc1234
      #   push tag v1.2.3 → 1.2.3, 1.2, 1, latest
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Branch 'main' → tag 'latest'
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Branch 'develop' → tag 'develop'
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            # Semantic version tags (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Always add short SHA tag
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Appota Frontend
            org.opencontainers.image.description=Appota Chatbot QA — React + Vite + Nginx
            org.opencontainers.image.vendor=Appota

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:5000' }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️  Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/    - /'
          echo "🔑 Digest: ${{ steps.build-push.outputs.digest }}"

  # ──────────────────────────────────────────────
  # JOB 4 — Notify (summary)
  # ──────────────────────────────────────────────
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, build-check, docker]
    if: always()

    steps:
      - name: Pipeline result
        run: |
          echo "==============================="
          echo "  CI/CD Pipeline Summary"
          echo "==============================="
          echo "  Repo   : ${{ github.repository }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Lint   : ${{ needs.lint.result }}"
          echo "  Build  : ${{ needs.build-check.result }}"
          echo "  Docker : ${{ needs.docker.result }}"
          echo "==============================="
